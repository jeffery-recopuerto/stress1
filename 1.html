<!DOCTYPE html>
<html lang='en'>
<head>
  <meta charset='UTF-8'>
  <meta name='viewport' content='width=device-width, initial-scale=1.0'>
  <title>Landing Page</title>
  <link rel='stylesheet' href='styles.css'>
</head>
<body>
  <header>
    <h1>Welcome to Our Landing</h1>
  </header>
  <main>
    <section id='animationSection'>
      <h2>Animation Section</h2>
      <div class='animated-box'></div>
    </section>
    <section id='sliderSection'>
      <h2>Slider Section</h2>
      <input type='range' id='slider' min='1' max='100' value='50'>
      <div id='sliderValue'>50</div>
    </section>
    <section id='feederSection'>
      <h2>Feeder Section</h2>
      <form id='feedForm'>
        <label for='name'>Name:</label>
        <input type='text' id='name' name='name'><br><br>
        <label for='email'>Email:</label>
        <input type='email' id='email' name='email'><br><br>
        <button type='submit'>Submit</button>
      </form>
    </section>
  </main>
</body>
<script src='scripts.js'></script>
</html>
